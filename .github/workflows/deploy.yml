name: Build and deploy

on:
  push:
    branches: [main]
    paths:
      - "erp_project/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: test
        type: choice
        options: [test, prod]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: erp-app

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erp_project
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: erp_project/package-lock.json

      - run: npm ci
      - run: npm run lint
        continue-on-error: true # 319 pre-existing issues as of 2026-07-07; visible in logs, not yet gating
      - run: npm run build

  build-and-push:
    needs: lint-and-build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      environment: ${{ steps.target.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine target environment
        id: target
        run: |
          # workflow_dispatch lets a human pick test or prod; a plain push to
          # main always goes to test — prod is a deliberate, manually-triggered promotion.
          echo "environment=${{ github.event.inputs.environment || 'test' }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (hosting account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ENVIRONMENT: ${{ steps.target.outputs.environment }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_REPOSITORY:$ENVIRONMENT-$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_REPOSITORY:$ENVIRONMENT" \
            erp_project
          docker push "$REGISTRY/$ECR_REPOSITORY:$ENVIRONMENT-$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:$ENVIRONMENT"

      - name: Roll out to EC2 via SSM
        env:
          ENVIRONMENT: ${{ steps.target.outputs.environment }}
        run: |
          aws ssm send-command \
            --targets "Key=tag:Name,Values=erp-app-${ENVIRONMENT}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy erp-app:${ENVIRONMENT} ${{ github.sha }}" \
            --parameters "{\"commands\":[
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${{ steps.ecr-login.outputs.registry }}\",
              \"docker pull ${{ steps.ecr-login.outputs.registry }}/$ECR_REPOSITORY:${ENVIRONMENT}\",
              \"docker rm -f erp || true\",
              \"docker run -d --name erp --restart unless-stopped -p 127.0.0.1:3000:3000 --env-file /etc/erp/env -v /var/log/erp:/app/logs ${{ steps.ecr-login.outputs.registry }}/$ECR_REPOSITORY:${ENVIRONMENT}\",
              \"docker image prune -f\"
            ]}" \
            --query 'Command.CommandId' --output text
