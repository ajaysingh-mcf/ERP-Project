name: Build and deploy

on:
  push:
    branches: [main]
    paths:
      - "erp_project/**"
      - ".github/workflows/deploy.yml"

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: erp-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (hosting account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$ECR_REPOSITORY:latest" erp_project
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Roll out to EC2 via SSM
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          aws ssm send-command \
            --targets "Key=tag:Name,Values=erp-app" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy erp-app ${{ github.sha }}" \
            --parameters "{\"commands\":[
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REGISTRY\",
              \"docker pull $REGISTRY/$ECR_REPOSITORY:latest\",
              \"docker rm -f erp || true\",
              \"docker run -d --name erp --restart unless-stopped -p 127.0.0.1:3000:3000 --env-file /etc/erp/env -v /var/log/erp:/app/logs $REGISTRY/$ECR_REPOSITORY:latest\"
            ]}" \
            --query 'Command.CommandId' --output text
